<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>
    <title>teste (Google Maps Export from Global Mapper)</title>
    <script type="text/javascript" src="http://maps.google.com/maps/api/js?sensor=false"></script>
    <script type="text/javascript">

    var G = google.maps;
    var map;
    
    var customMapType = new G.ImageMapType
      (
        {
        getTileUrl: function(coord, zoom)
          {
          var normalizedCoord = getNormalizedCoord(coord, zoom);
          if (!normalizedCoord) { return null; }
          
          if ( zoom == 18 && normalizedCoord.x >= 93784 && normalizedCoord.x <= 93792 && normalizedCoord.y >= 131077 && normalizedCoord.y <= 131086 )
          {
            return "file:///C://teste%20ecw//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".jpg"; // replace that with a "real" URL
          }
          else if ( zoom == 19 && normalizedCoord.x >= 187568 && normalizedCoord.x <= 187585 && normalizedCoord.y >= 262155 && normalizedCoord.y <= 262172 )
          {
            return "file:///C://teste%20ecw//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".jpg"; // replace that with a "real" URL
          }
          else if ( zoom == 20 && normalizedCoord.x >= 375136 && normalizedCoord.x <= 375170 && normalizedCoord.y >= 524311 && normalizedCoord.y <= 524344 )
          {
            return "file:///C://teste%20ecw//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".jpg"; // replace that with a "real" URL
          }
          else if ( zoom == 21 && normalizedCoord.x >= 750272 && normalizedCoord.x <= 750340 && normalizedCoord.y >= 1048623 && normalizedCoord.y <= 1048689 )
          {
            return "file:///C://teste%20ecw//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".jpg"; // replace that with a "real" URL
          }
          else if ( zoom == 22 && normalizedCoord.x >= 1500544 && normalizedCoord.x <= 1500680 && normalizedCoord.y >= 2097247 && normalizedCoord.y <= 2097379 )
          {
            return "file:///C://teste%20ecw//Z" + zoom + "/" + normalizedCoord.y + "/" + normalizedCoord.x + ".jpg"; // replace that with a "real" URL
          }
          return null;
        },

        alt: "teste",
        tileSize: new G.Size(256, 256),
        isPng: false,
        maxZoom: 22,
        minZoom: 18,
        opacity: 1.00,
        name: "teste"
      }
    )

    function getNormalizedCoord(coord, zoom)
    {
      var y = coord.y;
      var x = coord.x;
      
      var tileRange = 1 << zoom;
      
      if (y < 0 || y >= tileRange) { return null; }
      if (x < 0 || x >= tileRange)
      {
        x = (x % tileRange + tileRange) % tileRange;
      }
      
      return { x: x, y: y };
    }

    function initialize()
    {
      var myLatlng = new G.LatLng(-0.013046,-51.201096);
      var myOptions = {
        center: myLatlng,
        zoom: 18,
        mapTypeId: G.MapTypeId.ROADMAP,
        mapTypeControl: true,
        overviewMapControl: false,
        scaleControl: false,
        streetViewControl: false,
        panControl: true,
        zoomControl: true,
        zoomControlOptions: { style: google.maps.ZoomControlStyle.DEFAULT }
      };
      
      map = new G.Map(document.getElementById("map_canvas"), myOptions);
      map.overlayMapTypes.insertAt(0, customMapType);
    }
    </script>
</head>
<body onload="initialize()">
<div id="map_canvas" style="width: 100%; height: 800px; margin: 0px 0px 0px 0px; float: middle;"></div>
</body> </html>
